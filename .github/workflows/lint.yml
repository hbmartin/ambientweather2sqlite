name: Lint and Test
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: |
          uv sync --locked --dev

      - name: Run Black check
        run: |
          uv run black --check ambientweather2sqlite

      - name: Run Ruff check
        run: |
          uv run ruff check ambientweather2sqlite

      - name: Run Pyrefly check
        run: |
          uv run pyrefly check ambientweather2sqlite
      - name: Run ty check
        run: |
          uv run ty check ambientweather2sqlite
      - name: Run tests
        run: |
          uv run pytest tests/ --cov=ambientweather2sqlite --cov-report=xml

      - name: Upload coverage to Codecov
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          disable_search: true
          fail_ci_if_error: true
          root_dir: .
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
